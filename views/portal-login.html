<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Management Portal</title>

<style>
body{
    margin:0;
    background:#eef4fb;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    width:90%;
    max-width:400px;
    margin:80px auto;
}

.card{
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h2{
    color:#0057b8;
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-top:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:#0057b8;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#004090;
}

.back{
    display:block;
    margin-top:20px;
    text-align:center;
    color:#0057b8;
    text-decoration:none;
    font-weight:bold;
}
/* ==========================
   Mobile Responsive
========================== */

@media (max-width:768px){

    body{
        padding:20px;
    }

    .container{
        width:100%;
        margin:40px auto;
    }

    .card{
        padding:25px;
        border-radius:12px;
        box-sizing:border-box;
    }

    h2{
        font-size:30px;
    }

    input{
        padding:15px;
        font-size:16px;
    }

    button{
        padding:16px;
        font-size:18px;
    }

    .back{
        font-size:16px;
    }

}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>🔒 Management Portal</h2>

<form action="/portal/login" method="POST">

<input
type="password"
name="password"
placeholder="Portal Password"
required>

<button type="submit">
Continue
</button>

</form>

<a href="/" class="back">← Back to Home</a>

</div>

</div>

</body>
</html>
