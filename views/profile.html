<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile | Cerulean Funds</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef4fb;
}

header{
    background:#0057b8;
    color:white;
    padding:20px 40px;
}

.header-box{
    max-width:1100px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-box a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:40px auto;
}

.card{
    background:white;
    border-radius:15px;
    padding:35px;
    box-shadow:0 8px 25px rgba(0,0,0,.12);
}

h2{
    color:#0057b8;
    margin-bottom:30px;
}

.profile-photo{
    text-align:center;
    margin-bottom:30px;
}

.profile-photo img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #0057b8;
}

.profile-photo input{
    margin-top:15px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.readonly{
    background:#f4f4f4;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#0057b8;
    color:white;
    font-size:17px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#004090;
}

</style>

</head>

<body>

<header>

<div class="header-box">

<h1>My Profile</h1>

<a href="/dashboard">← Dashboard</a>

</div>

</header>

<div class="container">

<div class="card">

<div class="profile-photo">

<img
id="profilePreview"
src="https://via.placeholder.com/120">

<br>

<input
type="file"
id="photo">

</div>

<h2>Personal Information</h2>

<form id="profileForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="fullname">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>National ID</label>

<input
type="text"
id="nationalId"
class="readonly"
readonly>
</div>

<button type="submit">
Save Changes
</button>

</form>
<hr style="margin:40px 0;">

<h2>🔒 Change Password</h2>

<form id="passwordForm">

<div class="form-group">
<label>Current Password</label>
<input
type="password"
id="currentPassword"
required>

<label style="margin-top:10px;font-weight:normal;">
<input
type="checkbox"
id="showCurrent"
style="width:auto;margin-right:8px;">
Show Password
</label>
</div>

<div class="form-group">
<label>New Password</label>
<input
type="password"
id="newPassword"
required>

<label style="margin-top:10px;font-weight:normal;">
<input
type="checkbox"
id="showNew"
style="width:auto;margin-right:8px;">
Show Password
</label>
</div>

<div class="form-group">
<label>Confirm New Password</label>
<input
type="password"
id="confirmPassword"
required>

<label style="margin-top:10px;font-weight:normal;">
<input
type="checkbox"
id="showConfirm"
style="width:auto;margin-right:8px;">
Show Password
</label>
</div>

<button type="submit">
Change Password
</button>

</form>

</div>

</div>
<script>
fetch("/member/data")
.then(res => res.json())
.then(user => {

    document.getElementById("fullname").value = user.fullname || "";
    document.getElementById("email").value = user.email || "";
    document.getElementById("phone").value = user.phone || "";
    document.getElementById("nationalId").value = user.nationalId || "";

    console.log(user.nationalId);
console.log(document.getElementById("nationalId").value);

})
.catch(err => console.log(err));
document.getElementById("photo").addEventListener("change", function () {

    const file = this.files[0];

    if (file) {
        document.getElementById("profilePreview").src =
            URL.createObjectURL(file);
    }

});
document.getElementById("profileForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const fullname = document.getElementById("fullname").value;
    const email = document.getElementById("email").value;

    try{

        const response = await fetch("/profile/update", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                fullname,
                email
            })

        });

        const message = await response.text();

        alert(message);

    }catch(err){

        console.log(err);
        alert("Failed to update profile.");

    }

});
document.getElementById("passwordForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const currentPassword =
        document.getElementById("currentPassword").value;

    const newPassword =
        document.getElementById("newPassword").value;

    const confirmPassword =
        document.getElementById("confirmPassword").value;

    if(newPassword !== confirmPassword){

        alert("Passwords do not match");
        return;

    }

    const response = await fetch("/profile/password",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            currentPassword,
            newPassword
        })

    });

    alert(await response.text());

});
if(document.getElementById("showCurrent")){
    document.getElementById("showCurrent").addEventListener("change", function () {
        document.getElementById("currentPassword").type =
            this.checked ? "text" : "password";
    });
}

if(document.getElementById("showNew")){
    document.getElementById("showNew").addEventListener("change", function () {
        document.getElementById("newPassword").type =
            this.checked ? "text" : "password";
    });
}

if(document.getElementById("showConfirm")){
    document.getElementById("showConfirm").addEventListener("change", function () {
        document.getElementById("confirmPassword").type =
            this.checked ? "text" : "password";
    });
}
</script>
</body>
</html>
