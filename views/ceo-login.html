<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CEO Login</title>

<style>

body{
    background:#eef4fb;
    font-family:Arial,sans-serif;
}

.login-box{
    width:400px;
    margin:80px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    padding:10px 18px;
    background:#0057b8;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#004090;
}

h2{
    color:#0057b8;
    text-align:center;
    margin-top:10px;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:#0057b8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#004090;
}

</style>

</head>

<body>

<div class="login-box">

<a href="/login" class="back-btn">
← Back to Member Portal
</a>

<h2>CEO Login</h2>

<form action="/ceo/login" method="POST">

<input
type="text"
name="username"
placeholder="CEO Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>
Login
</button>

</form>

</div>

</body>
</html>
