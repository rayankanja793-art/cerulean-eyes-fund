<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Management Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0d1420;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:650px;
}

.card{
background:#1f1f1f;
border-radius:20px;
padding:40px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.35);
}

h1{
color:#6ec6ff;
margin-bottom:10px;
font-size:42px;
}

p{
color:#ddd;
font-size:20px;
margin-bottom:40px;
}

.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-bottom:30px;
}

.portal-btn{
background:#0057b8;
color:white;
text-decoration:none;
padding:35px 20px;
border-radius:15px;
font-size:22px;
font-weight:bold;
transition:.3s;
display:block;
}

.portal-btn:hover{
background:#004090;
transform:translateY(-5px);
}

.back{
display:inline-block;
margin-top:10px;
text-decoration:none;
color:#6ec6ff;
font-weight:bold;
font-size:18px;
}

.back:hover{
color:white;
}

/* Mobile */

@media (max-width:768px){

.card{
padding:25px;
}

h1{
font-size:32px;
}

p{
font-size:18px;
}

.buttons{
grid-template-columns:1fr;
}

.portal-btn{
font-size:20px;
padding:25px;
}

.back{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Welcome Back Boss 👋</h1>

<p>Select the portal you want to access.</p>

<div class="buttons">

<a href="/admin/login" class="portal-btn">
👨‍💼<br><br>
Admin Portal
</a>

<a href="/ceo/login" class="portal-btn">
👑<br><br>
CEO Portal
</a>

</div>

<a href="/" class="back">← Back to Home</a>

</div>

</div>

</body>
</html>
