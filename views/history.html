<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transaction History</title>

<style>

body{
    margin:0;
    background:#eef4fb;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    max-width:1000px;
    margin:50px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:15px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#0057b8;
    color:white;
}

.credit{
    color:green;
    font-weight:bold;
}

.debit{
    color:red;
    font-weight:bold;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    padding:10px 18px;
    background:#0057b8;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<a href="/dashboard" class="back">
← Dashboard
</a>

<div class="card">

<h2>📜 Transaction History</h2>

<table>

<thead>

<tr>

<th>Date</th>

<th>Type</th>

<th>Member</th>

<th>Amount</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="4" style="text-align:center;">
Loading...
</td>

</tr>

</tbody>

</table>

</div>

</div>
<script>

fetch("/history/data")
.then(res => res.json())
.then(result => {

    const currentUser = result.currentUser;
    const data = result.transactions;

    const table = document.getElementById("historyTable");

    table.innerHTML = "";

    if (data.length === 0) {

        table.innerHTML = `
        <tr>
            <td colspan="4" style="text-align:center;">
                No transactions found.
            </td>
        </tr>`;

        return;
    }

    data.forEach(item => {

        const isSender = item.sender._id == currentUser;

        let type;
        let member;
        let amount;

        if (isSender) {

            type = "📤 Sent";

            member = item.receiver.fullname + " (" + item.receiver.memberCode + ")";

            amount = "<span class='debit'>-KES " +
                     item.amount.toLocaleString() +
                     "</span>";

        } else {

            type = "📥 Received";

            member = item.sender.fullname + " (" + item.sender.memberCode + ")";

            amount = "<span class='credit'>+KES " +
                     item.amount.toLocaleString() +
                     "</span>";

        }

        table.innerHTML += `
        <tr>
            <td>${new Date(item.createdAt).toLocaleString()}</td>
            <td>${type}</td>
            <td>${member}</td>
            <td>${amount}</td>
        </tr>`;

    });

})
.catch(err => {
    console.log(err);
});

</script>
</body>
</html>
