<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Cerulean Funds</title>

<link rel="stylesheet" href="/style.css">

<style>
body{
    background:#eef3fb;
    font-family:Arial,Helvetica,sans-serif;
}

.login-container{
    width:420px;
    margin:60px auto;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.login-container h1{
    text-align:center;
    color:#0057b8;
    margin-bottom:30px;
}

.login-container input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.login-container button{
    width:100%;
    padding:15px;
    border:none;
    background:#0057b8;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

.login-container button:hover{
    background:#004090;
}

.login-container p{
    text-align:center;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="login-container">

<h1>Login</h1>

<form action="/login" method="POST">

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

<p>
Don't have an account?
<a href="/register">Create Account</a>
</p>

</form>

</div>

</body>
</html>
