<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef4fb;
}

header{
    background:#0057b8;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    text-align:center;
}

.card h2{
    color:#0057b8;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 20px;
    background:#0057b8;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>

</head>

<body>

<header>
<h1>Cerulean Funds Member Dashboard</h1>
</header>

<div class="container">

<div class="card">
<h2>Apply for Loan</h2>
<p>Submit a new loan application.</p>
<a href="/loan" class="btn">Apply</a>
</div>

<div class="card">
<h2>Loan Status</h2>
<p>View your current application status.</p>
<a href="#" class="btn">View</a>
</div>

<div class="card">
<h2>Profile</h2>
<p>Update your personal information.</p>
<a href="#" class="btn">Profile</a>
</div>

<div class="card">
<h2>Logout</h2>
<p>Securely sign out of your account.</p>
<a href="/" class="btn">Logout</a>
</div>

</div>

</body>
</html>
