<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

body{
    margin:0;
    background:#eef4fb;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    width:400px;
    margin:100px auto;
}

.card{
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h2{
    color:#0057b8;
    text-align:center;
}

label{
    display:block;
    margin-top:20px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:30px;
    padding:15px;
    background:#0057b8;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#004090;
}
.back-container{
    width:400px;
    margin:30px auto 0;
}

.back-btn{
    display:inline-block;
    text-decoration:none;
    color:#0057b8;
    font-weight:bold;
    background:white;
    padding:10px 18px;
    border-radius:8px;
    box-shadow:0 3px 10px rgba(0,0,0,.12);
    transition:.3s;
}

.back-btn:hover{
    background:#0057b8;
    color:white;
}
</style>

</head>

<body>
<div class="back-container">
    <a href="/" class="back-btn">← Back to Home</a>
</div>
<div class="container">

<div class="card">

<h2>Admin Login</h2>

<form method="POST" action="/admin/login">

<label>Username</label>

<input
type="text"
name="username"
required>

<label>Password</label>

<input
type="password"
name="password"
required>

<button type="submit">

Login

</button>

</form>

</div>

</div>

</body>
</html>
