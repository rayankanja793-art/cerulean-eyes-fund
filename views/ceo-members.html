<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registered Members</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef3f9;
}

.navbar{
    background:#0057b8;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

.container{
    width:95%;
    max-width:1300px;
    margin:30px auto;
}

h1{
    color:#0057b8;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

th{
    background:#0057b8;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid #eee;
}

tbody tr:hover{
    background:#f5f9ff;
}

.wallet{
    color:#27ae60;
    font-weight:bold;
}
/* ===========================
   Mobile Responsive
=========================== */

@media (max-width:768px){

    .navbar{
        flex-direction:column;
        align-items:flex-start;
        padding:20px;
        gap:15px;
    }

    .navbar h2{
        margin:0;
        font-size:24px;
    }

    .navbar div{
        display:flex;
        flex-wrap:wrap;
        gap:15px;
    }

    .navbar a{
        margin:0;
        font-size:15px;
    }

    .container{
        width:100%;
        padding:15px;
        margin:0;
        box-sizing:border-box;
    }

    h1{
        font-size:30px;
        margin-bottom:20px;
    }

    /* Make the table scroll horizontally */
    .table-wrapper{
        width:100%;
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
    }

    table{
        min-width:700px;
    }

    th,
    td{
        padding:12px;
        font-size:14px;
        white-space:nowrap;
    }

    td:nth-child(2),
    td:nth-child(4){
        white-space:normal;
    }

}
/* ===========================
   MEMBER CARDS
=========================== */

#membersContainer{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:20px;
}

.member-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
    transition:.3s;
}

.member-card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 25px rgba(0,87,184,.25);
}

.member-card h3{
    color:#0057b8;
    margin:0 0 15px;
}

.member-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.member-item:last-child{
    border-bottom:none;
}

.label{
    color:#666;
    font-weight:bold;
}

.value{
    font-weight:bold;
    text-align:right;
    word-break:break-word;
}

.wallet{
    color:#27ae60;
    font-size:22px;
    font-weight:bold;
}

@media(max-width:768px){

    #membersContainer{
        grid-template-columns:1fr;
    }

    .member-card{
        padding:18px;
    }

    .member-item{
        flex-direction:column;
        gap:5px;
    }

    .value{
        text-align:left;
    }

}
</style>

</head>

<body>

<div class="navbar">

<h2>👥 Registered Members</h2>

<div>
<a href="/ceo">Dashboard</a>
<a href="/admin">Loans</a>
<a href="/ceo/logout">Logout</a>
</div>

</div>

<div class="container">

<h1>All Members</h1>

<div class="table-wrapper">

<div id="membersContainer"></div>

</div>

</div>

<script>

fetch("/ceo/members/json")
.then(res => res.json())
.then(members => {

    const container = document.getElementById("membersContainer");

    container.innerHTML = "";

    members.forEach(member => {

        container.innerHTML += `

        <div class="member-card">

            <h3>👤 ${member.fullname || "-"}</h3>

            <div class="member-item">
                <span class="label">Member Code</span>
                <span class="value">${member.memberCode || "-"}</span>
            </div>

            <div class="member-item">
                <span class="label">Phone</span>
                <span class="value">${member.phone || "-"}</span>
            </div>

            <div class="member-item">
                <span class="label">Email</span>
                <span class="value">${member.email || "-"}</span>
            </div>

            <div class="member-item">
                <span class="label">Wallet Balance</span>
                <span class="wallet">
                    KES ${(member.wallet || 0).toLocaleString()}
                </span>
            </div>

        </div>

        `;

    });

})
.catch(err => console.log(err));

</script>

</body>
</html>
