<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registered Members</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef3f9;
}

.navbar{
    background:#0057b8;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

.container{
    width:95%;
    max-width:1300px;
    margin:30px auto;
}

h1{
    color:#0057b8;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

th{
    background:#0057b8;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid #eee;
}

tbody tr:hover{
    background:#f5f9ff;
}

.wallet{
    color:#27ae60;
    font-weight:bold;
}
/* ===========================
   Mobile Responsive
=========================== */

@media (max-width:768px){

    .navbar{
        flex-direction:column;
        align-items:flex-start;
        padding:20px;
        gap:15px;
    }

    .navbar h2{
        margin:0;
        font-size:24px;
    }

    .navbar div{
        display:flex;
        flex-wrap:wrap;
        gap:15px;
    }

    .navbar a{
        margin:0;
        font-size:15px;
    }

    .container{
        width:100%;
        padding:15px;
        margin:0;
        box-sizing:border-box;
    }

    h1{
        font-size:30px;
        margin-bottom:20px;
    }

    /* Make the table scroll horizontally */
    .table-wrapper{
        width:100%;
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
    }

    table{
        min-width:700px;
    }

    th,
    td{
        padding:12px;
        font-size:14px;
        white-space:nowrap;
    }

    td:nth-child(2),
    td:nth-child(4){
        white-space:normal;
    }

}
</style>

</head>

<body>

<div class="navbar">

<h2>👥 Registered Members</h2>

<div>
<a href="/ceo">Dashboard</a>
<a href="/admin">Loans</a>
<a href="/ceo/logout">Logout</a>
</div>

</div>

<div class="container">

<h1>All Members</h1>

<div class="table-wrapper">

<table>

<thead>

<tr>
<th>Member Code</th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Wallet</th>
</tr>

</thead>

<tbody id="memberTable"></tbody>

</table>

</div>

</div>

<script>

fetch("/ceo/members/json")
.then(res => res.json())
.then(members => {

    console.log(members);

    const table = document.getElementById("memberTable");
    table.innerHTML = "";

    members.forEach(member => {

        table.innerHTML += `
        <tr>
            <td>${member.memberCode || "-"}</td>
            <td>${member.fullname || "-"}</td>
            <td>${member.phone || "-"}</td>
            <td>${member.email || "-"}</td>
            <td class="wallet">
                KES ${(member.wallet || 0).toLocaleString()}
            </td>
        </tr>
        `;

    });

})
.catch(err => console.log(err));

</script>

</body>
</html>
