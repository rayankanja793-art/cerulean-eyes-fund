<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Members Management</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#eef3f9;
    font-family:Arial, Helvetica, sans-serif;
}

.navbar{
    background:#0057b8;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
    border-radius:12px;
    margin-bottom:30px;
}

.navbar h2{
    margin:0;
    font-size:28px;
}

.navbar div{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}
.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    margin-bottom:30px;
    text-align:center;
}

.card h2{
    color:#0057b8;
    font-size:40px;
    margin:0;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

th{
    background:#0057b8;
    color:white;
    padding:16px;
    text-align:left;
}

td{
    padding:15px;
    border-bottom:1px solid #eee;
}

tbody tr:hover{
    background:#f5f9ff;
}
.view-btn{
    background:#0057b8;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.view-btn:hover{
    background:#003f87;
}
/* ===== MEMBER PROFILE MODAL ===== */

.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    width:500px;
    max-width:90%;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    animation:popup .3s ease;
}

@keyframes popup{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.close{
    float:right;
    font-size:32px;
    cursor:pointer;
    color:#777;
}

.close:hover{
    color:#e74c3c;
}

.modal h2{
    color:#0057b8;
    margin-bottom:25px;
}

.profile-item{
    margin:18px 0;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
    font-size:17px;
}

.profile-item strong{
    display:inline-block;
    width:140px;
    color:#0057b8;
}
.table-container{
    overflow-x:auto;
}
</style>
</head>

<body>

<div class="navbar">

    <h2>Cerulean Funds - Members</h2>

    <div>
        <a href="/ceo">CEO Dashboard</a>
        <a href="/admin">Admin</a>
    </div>

</div>

<div class="card">
    <h2 id="totalMembers">0</h2>
    <p>Total Registered Members</p>
</div>
<div style="margin-bottom:20px;">

 <input
type="text"
id="searchBox"
placeholder="🔍 Search by Name, Email or Phone..."
style="
width:100%;
max-width:350px;
padding:12px;
border:2px solid #0057b8;
border-radius:8px;
font-size:15px;
">

</div>
<div class="table-container">

<table>

<thead>

<tr>

<th>Member Code</th>
<th>Full Name</th>
<th>Email</th>
<th>Phone</th>
<th>Wallet</th>
<th>Date Joined</th>
<th>Action</th>

</tr>

</thead>

<tbody id="membersTable"></tbody>

</table>

</div>
<!-- MEMBER PROFILE MODAL -->

<div id="memberModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <h2>Member Profile</h2>

        <div class="profile-item">
            <strong>Full Name:</strong>
            <span id="mFullname"></span>
        </div>

        <div class="profile-item">
            <strong>Email:</strong>
            <span id="mEmail"></span>
        </div>

        <div class="profile-item">
            <strong>Phone:</strong>
            <span id="mPhone"></span>
        </div>

        <div class="profile-item">
            <strong>National ID:</strong>
            <span id="mNationalId"></span>
        </div>

        <div class="profile-item">
            <strong>Date Joined:</strong>
            <span id="mDate"></span>
        </div>

    </div>

</div>
<script>

fetch("/ceo/members/json")
.then(res => res.json())
.then(users => {

    console.log(users);

    document.getElementById("totalMembers").innerText = users.length;

    const table = document.getElementById("membersTable");

    table.innerHTML = "";

    users.forEach(user => {

        table.innerHTML += `
<tr>

    <td>${user.fullname || "-"}</td>

    <td>${user.email || "-"}</td>

    <td>${user.phone || "-"}</td>

    <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString() : "-"}</td>

    <td>
        <button class="view-btn" onclick="viewMember('${user._id}')">
            👁 View
        </button>
    </td>

</tr>
`;

    });

})
.catch(err => console.log(err));
const searchBox = document.getElementById("searchBox");

searchBox.addEventListener("keyup", function () {

    const value = this.value.toLowerCase();

    const rows = document.querySelectorAll("#membersTable tr");

    rows.forEach(row => {

        if (row.innerText.toLowerCase().includes(value)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }

    });

});
function viewMember(id){

    fetch("/ceo/member/" + id)
    .then(res => res.json())
    .then(user => {

        document.getElementById("mFullname").innerText = user.fullname || "-";
        document.getElementById("mEmail").innerText = user.email || "-";
        document.getElementById("mPhone").innerText = user.phone || "-";
        document.getElementById("mNationalId").innerText = user.nationalId || "-";

        document.getElementById("mDate").innerText =
            user.createdAt
            ? new Date(user.createdAt).toLocaleDateString()
            : "-";

        document.getElementById("memberModal").style.display = "flex";

    })
    .catch(err => console.log(err));

}

function closeModal(){

    document.getElementById("memberModal").style.display = "none";

}

window.onclick = function(event){

    const modal = document.getElementById("memberModal");

    if(event.target === modal){
        modal.style.display = "none";
    }

}
</script>

</body>
</html>
