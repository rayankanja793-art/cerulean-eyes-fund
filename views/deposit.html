<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit Funds</title>

<style>

body{
    margin:0;
    background:#eef4fb;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    background:#0057b8;
    color:white;
    padding:20px 40px;
}
.header-box{
    max-width:1100px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.back-btn{
    color:white;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
}

.back-btn:hover{
    text-decoration:underline;
}
.container{
    max-width:500px;
    margin:60px auto;
}

.card{
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h2{
    color:#0057b8;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:30px;
    padding:15px;
    background:#0057b8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#004090;
}

</style>

</head>

<body>

<header>

<div class="header-box">

<a href="/dashboard" class="back-btn">← Dashboard</a>

<h1>Deposit Funds</h1>

<div></div>

</div>

</header>

<div class="container">

<div class="card">

<h2>M-Pesa Deposit</h2>

<form id="depositForm">

<label>Phone Number</label>

<input
type="text"
id="phone"
readonly>

<label>Amount (KES)</label>

<input
type="number"
id="amount"
placeholder="Enter Amount"
required>

<button type="submit">
Deposit Now
</button>

</form>

</div>

</div>

<script>

// Load logged-in member phone number
fetch("/member/data")
.then(res => res.json())
.then(user => {

    document.getElementById("phone").value = user.phone;

})
.catch(err => console.log(err));

// Deposit request
document.getElementById("depositForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const amount = document.getElementById("amount").value;

    try{

        const response = await fetch("/deposit",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                amount
            })

        });

        const message = await response.text();

        alert(message);

    }catch(err){

        console.log(err);
        alert("Deposit failed.");

    }

});

</script>

</body>
</html>
