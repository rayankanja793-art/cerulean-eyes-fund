<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply for Loan</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#eef3fb;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#0057b8;
}

input,select,textarea{
    width:100%;
    padding:14px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#0057b8;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#003f88;
}
</style>

</head>

<body>

<div class="container">

<h1>Loan Application</h1>

<form action="/apply-loan" method="POST">

<input
type="email"
name="userEmail"
placeholder="Email Address"
required>

<input
type="number"
name="amount"
placeholder="Loan Amount"
required>

<select name="duration" required>
<option value="">Repayment Period</option>
<option>1 Month</option>
<option>3 Months</option>
<option>6 Months</option>
<option>12 Months</option>
<option>24 Months</option>
</select>

<textarea
name="purpose"
rows="5"
placeholder="Purpose of the loan"
required></textarea>

<button type="submit">
Submit Loan Application
</button>

</form>

</div>

</body>
</html>
