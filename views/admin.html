<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fb;
    padding:40px;
}

.navbar{
    background:#0057b8;
    color:white;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:10px;
    margin-bottom:25px;
}

.navbar h2{
    margin:0;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.cards{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    width:220px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    text-align:center;
}

.card h2{
    color:#0057b8;
    font-size:32px;
    margin:0;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    padding:15px;
    border:1px solid #ddd;
    text-align:left;
}

th{
    background:#0057b8;
    color:white;
}

img{
    width:120px;
    border-radius:8px;
}

.status{
    padding:8px 14px;
    border-radius:20px;
    color:white;
    font-weight:bold;
}

.pending{
    background:#f39c12;
}

.approved{
    background:#27ae60;
}

.rejected{
    background:#e74c3c;
}

.approve-btn{
    background:#27ae60;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.reject-btn{
    background:#e74c3c;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">

    <h2>Cerulean Funds Admin</h2>

    <div>

        <a href="/dashboard" style="margin-right:20px;">
            👤 Member Dashboard
        </a>

        <a href="/admin/deposits" style="margin-right:20px;">
            💳 Deposits
        </a>

        <a href="/admin/logout">
            🚪 Logout
        </a>

    </div>

</div>

<h1>Loan Applications</h1>
<div style="margin-bottom:20px;">

<input
type="text"
id="searchBox"
placeholder="🔍 Search by Name, Phone or Email..."
style="
width:350px;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
">

</div>
<div class="cards">

<div class="card">
<h2 id="totalLoans">0</h2>
<p>Total Loans</p>
</div>

<div class="card">
<h2 id="pendingLoans">0</h2>
<p>Pending</p>
</div>

<div class="card">
<h2 id="approvedLoans">0</h2>
<p>Approved</p>
</div>

<div class="card">
<h2 id="rejectedLoans">0</h2>
<p>Rejected</p>
</div>

</div>

<table>

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Amount</th>
<th>Purpose</th>
<th>ID Front</th>
<th>ID Back</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="loanTable"></tbody>

</table>

<script>

fetch("/admin/loans/json")
.then(res => res.json())
.then(loans => {

    document.getElementById("totalLoans").innerText = loans.length;

    document.getElementById("pendingLoans").innerText =
        loans.filter(l => l.status === "Pending").length;

    document.getElementById("approvedLoans").innerText =
        loans.filter(l => l.status === "Approved").length;

    document.getElementById("rejectedLoans").innerText =
        loans.filter(l => l.status === "Rejected").length;

    const table = document.getElementById("loanTable");

    table.innerHTML = "";

    loans.forEach(loan => {

        table.innerHTML += `
        <tr>

            <td>${loan.fullName || ""}</td>

            <td>${loan.phone || ""}</td>

            <td>${loan.userEmail}</td>

            <td>KES ${loan.amount}</td>

            <td>${loan.purpose}</td>

            <td><img src="/${loan.idFront}"></td>

            <td><img src="/${loan.idBack}"></td>

            <td>
                <span class="status ${loan.status.toLowerCase()}">
                    ${loan.status}
                </span>
            </td>

            <td>

            ${
                loan.status === "Pending"

                ?

                `
                <form action="/admin/approve/${loan._id}" method="POST" style="display:inline;" onsubmit="return confirm('Approve this loan?')">
                    <button class="approve-btn">✔ Approve</button>
                </form>

                <form action="/admin/reject/${loan._id}" method="POST" style="display:inline;" onsubmit="return confirm('Reject this loan?')">
                    <button class="reject-btn">✖ Reject</button>
                </form>
                `

                :

                `<strong>Completed</strong>`
            }

            </td>

        </tr>
        `;

    });

    // Search
    const searchBox = document.getElementById("searchBox");

    searchBox.addEventListener("keyup", function () {

        const value = this.value.toLowerCase();

        const rows = document.querySelectorAll("#loanTable tr");

        rows.forEach(row => {

            row.style.display =
                row.innerText.toLowerCase().includes(value)
                ? ""
                : "none";

        });

    });

})
.catch(err => console.error(err));

</script>
</body>
</html>
