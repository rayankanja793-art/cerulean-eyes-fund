<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Investments | Cerulean Funds</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef4fb;
}

header{
    background:#0057b8;
    color:white;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:30px auto;
    padding:20px;
}

.summary{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.summary-card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.summary-card h2{
    color:#0057b8;
    margin:0;
}

.summary-card h1{
    margin-top:15px;
}

.investment-card{
    background:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.status{
    display:inline-block;
    background:#16a34a;
    color:white;
    padding:6px 15px;
    border-radius:20px;
    margin-top:10px;
}

.back-btn{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#0057b8;
    font-weight:bold;
}
.download-btn{
    margin-top:20px;
    background:#0057b8;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
}

.download-btn:hover{
    background:#004090;
}
</style>

</head>

<body>

<header>

<h1>📊 My Investments</h1>

</header>

<div class="container">

<div class="summary">

<div class="summary-card">
<h2>Total Invested</h2>
<h1 id="totalInvested">KES 0</h1>
</div>

<div class="summary-card">
<h2>Expected Returns</h2>
<h1 id="expectedReturns">KES 0</h1>
</div>

<div class="summary-card">
<h2>Active Plans</h2>
<h1 id="activePlans">0</h1>
</div>

</div>

<div id="investmentList">

Loading...

</div>

<a href="/dashboard" class="back-btn">
← Back to Dashboard
</a>

</div>

<script>

fetch("/my-investments")
.then(res => res.json())
.then(data => {

    const list = document.getElementById("investmentList");

    list.innerHTML = "";

    let totalInvested = 0;
    let totalReturns = 0;

    document.getElementById("activePlans").innerText = data.investments.length;

    if (data.investments.length === 0) {

        list.innerHTML = `
        <div class="investment-card">
            <h2>No Investments Yet</h2>
            <p>You have not made any investments.</p>
        </div>`;

        return;
    }

    data.investments.forEach(inv => {

        totalInvested += inv.amount;
        totalReturns += inv.expectedReturn;

        list.innerHTML += `

        <div class="investment-card">

            <h2>${inv.plan} Plan</h2>

            <span class="status">${inv.status}</span>

            <p><strong>Amount:</strong> KES ${inv.amount.toLocaleString()}</p>

            <p><strong>Expected Return:</strong> KES ${inv.expectedReturn.toLocaleString()}</p>

            <p><strong>ROI:</strong> ${inv.roi}%</p>

            <p><strong>Duration:</strong> ${inv.duration}</p>

            <p><strong>Started:</strong> ${new Date(inv.startDate).toLocaleDateString()}</p>

            <p><strong>Matures:</strong> ${new Date(inv.maturityDate).toLocaleDateString()}</p>

            <button class="download-btn"
                    onclick="downloadPDF('${inv._id}')">
                📄 Download PDF
            </button>

        </div>

        `;

    });

    document.getElementById("totalInvested").innerText =
        "KES " + totalInvested.toLocaleString();

    document.getElementById("expectedReturns").innerText =
        "KES " + totalReturns.toLocaleString();

})
.catch(err => console.error(err));

function downloadPDF(id) {
    window.location.href = "/investment/" + id + "/pdf";
}

</script>
</body>
</html>
